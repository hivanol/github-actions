name: test-project
on:
  push:
    branches:
      - master
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: get code
        uses: actions/checkout@v3
      - name: install node
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: my-cache-${{ hashFiles('**/package-lock.json') }}
      - name: install deps
        run: npm ci
      - name: Run tests
        run: npm test
  build:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      dist-files: ${{ steps.envvar.outputs.my_dist_files }}
    steps:
      - name: get code
        uses: actions/checkout@v3
      - name: install node
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: my-cache-${{ hashFiles('**/package-lock.json') }}
      - name: install deps
        run: npm ci
      - name: Build
        run: npm run build
      - name: upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: dist-files
          path: dist
      - name: find a file
        run: my_dist_files=$(ls -laht dist) && echo "my_dist_files=$my_dist_files" >> $GITHUB_OUTPUT
        id: envvar
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: check vars
        run: echo "${{ needs.build.outputs.dist-files }}"
      - name: download artifact
        uses: actions/download-artifact@v6
        with:
          name: dist-files
      - name: Deploy
        run: ls -laht
